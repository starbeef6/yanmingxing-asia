<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>库存与缺货检查 - 严明星数据处理中心</title>
  <link rel="stylesheet" href="../../assets/site.css">
</head>
<body>
  <main class="shell" data-tool-id="inventory-check">
    <nav class="topbar" aria-label="页面导航">
      <a class="back-link" href="../">返回供应链模块</a>
      <span class="eyebrow">Supply Chain Tool</span>
    </nav>

    <header class="hero">
      <p class="eyebrow">SC-02</p>
      <h1 data-tool-title>库存与缺货检查</h1>
      <p class="hero-copy" data-tool-description>上传库存或销售相关表，后端输出缺货、异常或周转检查结果。</p>
    </header>

    <section class="section tool-layout">
      <div class="upload-panel">
        <h2>上传文件</h2>
        <p>把 Excel 或 CSV 拖进来，或者点击选择文件。文件不会在 GitHub Pages 处理，只会提交到后端 API。</p>
        <label class="drop-zone" data-drop-zone>
          <input type="file" data-file-input>
          <span>
            <span class="drop-icon">+</span>
            <strong>拖拽文件到这里</strong><br>
            <small>支持 .xlsx / .xls / .csv</small>
          </span>
        </label>
        <div class="file-list" data-file-list></div>
        <div class="tool-actions">
          <button class="button dark" type="button" data-run-tool disabled>开始处理</button>
          <button class="button light" type="button" data-clear-files>清空文件</button>
          <a class="button primary" href="#" data-download-link hidden>下载结果</a>
        </div>
      </div>

      <aside class="result-panel">
        <h2>处理状态</h2>
        <div class="status-box" data-status>请选择要处理的文件。</div>
        <div class="endpoint-note">后端接口占位：<code data-tool-endpoint></code></div>
      </aside>
    </section>
  </main>
  <script src="../../assets/tool-runner.js"></script>
</body>
</html>
